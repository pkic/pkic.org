    description: |
      Serving as a pillar in the cryptography community for more than two decades, Andoni demonstrates a commitment to excellence in her field. Combining her customer driven leadership and technology prowess, Andoni builds and leads product teams that create revolutionary new products intent on making effective encryption and decryption capabilities more accessible to highly regulated government agencies, commercial organizations, and NGOs.

      Prior to becoming the CEO of Zeva Inc., Andoni made a name for herself in the data analytics realm, most recently as the Research Director for the Center for Responsible Politics, a data-centric, non-profit organization located in Washington D.C.

      Andoni holds a Bachelor’s degree in Mathematics from Bethlehem University, and a Master’s degree in Information Systems from American University in Washington D.C. When she’s not leading the development of powerful new cryptography tools, Andoni is a dedicated member of the International Women’s Forum of Washington, DC, and serves as a Co-Founder of NAAWA, the National Arab American Women’s Association. In her time off, Andoni enjoys spending time with her husband and three children while participating in fundraising for humanitarian causes and other events in the community.

# Long-form content (markdown)
content: |
  Welcome to Zeva Inc! For nearly two decades, Zeva has been a global IT security leader specializing in cryptography, Identity and Access Management, and digital security systems with a primary focus in PKI Enablement (PKE). 

  As a proud Woman Owned Small Business (WOSB), Zeva consistently strives to be at the forefront of innovation solving highly complex Identity and security challenges. Supporting the U.S. Federal Government’s strategic investments in developing a mature Federal PKI landscape, Zeva has developed a SaaS product, ZevaCrypt, a comprehensive solution to enable the use of the encryption certificate on PIV/CAC, which is the most secure way to encrypt email communication. 

  Zeva’s Commercial off the Shelf (COTS) product line, DecryptNaBox™ address challenges and consequences of End-to-End Encryption such as 3rd party FOIA requests, NARA compliance, PKI Technology Migration, and Data Loss Prevention & Data Inspection, And more.

  Through our complimentary technology products, which are strategically engineered and tailored to support government agencies adhering to Federal compliance mandates, (HSPD-12), Zeva’s team is well positioned to support your agency’s PKE needs. 

  For more information, visit us at www.zevainc.com

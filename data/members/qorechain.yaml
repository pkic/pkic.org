# Long-form content (markdown)
content: |
 ## A quantum-safe, AI-native foundation for the next decade of digital trust
 
  QoreChain Association is a Swiss-registered non-profit, domiciled in Rolle, Vaud (CHE-484.963.998). The Association stewards QoreChain, a Layer 1 blockchain designed from the ground up for the post-quantum era. The project began in 2017 as a static application security testing platform and pivoted in 2023 toward quantum-safe distributed infrastructure, as it became clear that the cryptography securing today's blockchains, identity systems, and financial messaging would not survive the arrival of cryptographically relevant quantum computers.
 
  ### Watch: QoreChain in 60 seconds
 
  {{< youtube XdmmMHcnLlM >}}
 
  ### Why QoreChain exists
 
  The threat is not theoretical. Adversaries are already engaged in *Harvest Now, Decrypt Later* attacks: capturing encrypted traffic and ciphertexts today with the intent to decrypt them once quantum capability matures. For long-lived assets such as sovereign records, settlement messages, supply-chain provenance, and digital identity, migrating to post-quantum cryptography is not a roadmap item. It is a deadline.
 
  QoreChain treats post-quantum readiness as a foundational requirement, not a retrofit. There is no classical fallback path that quietly reintroduces the vulnerability we set out to remove.
 
  ### Native post-quantum cryptography
 
  Every transaction, validator signature, and consensus message on QoreChain is signed and verified using NIST-standardized post-quantum algorithms:
 
  - **ML-DSA-87 (CRYSTALS-Dilithium, security level 5)** for digital signatures
  - **ML-KEM-1024 (CRYSTALS-Kyber)** for key encapsulation
  - **SHAKE-256** for extendable-output hashing
 
  These primitives are integrated at the protocol level, including the account model, validator set, light-client proofs, and the interchain bridge.
 
  ### PRISM consensus and the QoreChain Consensus Engine
 
  QoreChain runs on **PRISM** (Policy-driven Reinforcement-learning for Intelligent State Machines), a consensus engine that combines proven Byzantine-fault-tolerant guarantees with reinforcement-learning-driven optimization of validator behavior, message propagation, and resource scheduling. The architecture is designed to deliver high throughput and sub-second finality at network scale.
 
  ### QCAI: AI services native to the chain
 
  **QCAI** is QoreChain's native AI service layer, available to applications and operators in three tiers (Fast, Balanced, Advanced) covering fast inference, agent workflows, and complex reasoning. Smart contracts on QoreChain can request AI assistance directly through protocol primitives, with deterministic verification anchored on-chain.
 
  ### Triple virtual machine architecture
 
  QoreChain supports three execution environments running side by side:
 
  - **EVM** for Ethereum-compatible smart contracts and tooling
  - **CosmWasm** for Rust-based contracts and modular interoperability
  - **SVM** for Solana-style high-throughput execution
 
  Developers from each ecosystem deploy with familiar tooling, while assets and messages flow between virtual machines through unified interchain logic.
 
  ### Cross-network validator architecture
 
  QoreChain validators do more than produce blocks. They also operate bridge watchers and earn attestation fees across more than 25 directly connected Layer 1 networks, with reach into 120+ chains via interchain messaging. This multi-stream model is central to QoreChain's identity as genuine interchain infrastructure rather than another isolated chain, and is expected to account for the majority of validator revenue at network maturity.
 
  ### Why the PKI Consortium
 
  QoreChain joined the PKI Consortium in April 2026 and contributes to the **Post-Quantum Cryptography Working Group**. The Consortium is the most credible global venue for the work of replacing classical cryptography across Internet-scale trust systems. We want QoreChain's experience deploying ML-DSA, ML-KEM, and SHAKE in a live blockchain environment, including PQC-protected validator signatures, light-node attestation, and cross-chain message authentication, to inform the broader industry transition to quantum-safe trust services.

content: |
  ## About SecureMachines

  **SecureMachines** is a Bangalore-based deep-tech company focused on building next-generation **Quantum-Safe Security Infrastructure**. Our flagship product, **Prastaara**, is India’s first HSM designed from the ground up to support **Post-Quantum Cryptography (PQC)** alongside classical crypto, enabling organizations to modernize their PKI, key management, and secure communication systems.

  ### Our Platform Delivers

  - **Full PQC algorithm support** (ML-KEM, ML-DSA, SLH-DSA, etc.) aligned with NIST standards
  - **High-performance cryptographic processing**, powered by in-house hardware IP
  - **Secure key lifecycle management** for PKI, identity systems, and telecom/financial infra
  - **Crypto-agile APIs** to support hybrid deployments during PQC migration
  - **FIPS-aligned architecture** and strong hardware-rooted trust

  SecureMachines works with enterprises, government agencies, critical infrastructure, and telecom networks to enable quantum-resilient PKI, secure VPN infrastructures, and long-term digital trust.

description: Microsec Ltd. is a mid-sized qualified trust service provider (QTSP) and a PKI technology expert independent software vendor (ISV), located in Budapest, Hungary, founded in 1984. The product range includes a Certificate Authority software family and a security framework for the vehicle-to-everything communication.


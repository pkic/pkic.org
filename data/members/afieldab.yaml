# Long-form content (markdown)
title: Afield AB
content: |
  Afield AB is an independent consultancy providing enterprise architecture and digital transformation advisory services, with an emerging specialization in post-quantum cryptography readiness.

  Our role in the PKI ecosystem is helping enterprises—particularly in automotive and manufacturing—understand and prepare for cryptographic transition:

  - Assessing cryptographic dependencies across enterprise platforms
  - Translating regulatory requirements (DORA, NIS2, ANSSI timelines) into migration strategies
  - Bridging the gap between cryptographic standards and organizational implementation
  - Advising on AI system security where long operational lifespans create unique PQC exposure

  We serve clients whose PKI infrastructure underpins critical business operations—financial platforms, supply chain authentication, connected products—and who need practical guidance navigating the quantum transition.

  Current client relationships include Volvo Group, where we advise on digital strategy transformation across platforms handling operations in 190+ markets.

    description: |
      Bill Turner is an independent cryptography and critical infrastructure architect with 25 years of experience. His work has focused on securing critical infrastructure — including major Canadian financial institutions — and he has applied that experience to post-quantum cryptography migration and the governance of agentic AI systems.

      He is the originator of the CBOM Profiles Working Group concept and serves as its Vice Chair. He is also an active member of the PQC Working Group at the PKI Consortium, and participates in NIST working groups, the Cloud Security Alliance, and the Canadian Cyber Forum.

event:
  year: 2026
  slug: pqc-conference-amsterdam-nl
  name: Post-Quantum Cryptography Conference
  timezone: Europe/Amsterdam
  # sessionTypes: restrict which session formats are offered for this event.
  # Remove a type to hide it from the proposal form. Falls back to [talk, keynote, panel] if omitted.
  sessionTypes:
    - talk
    - keynote
    - panel
    - tutorial
    - demo
    - lightning_talk
  # Optional event-level range (kept for compatibility); per-day startsAt/endsAt are preferred.
  startsAt: "2026-12-01T08:00:00.000Z"
  endsAt: "2026-12-03T18:00:00.000Z"
  registrationMode: invite_or_open
  inviteLimitAttendee: 5
  # location: Short location label displayed on OG badges and in UI.
  location: "Amsterdam, The Netherlands"
  # heroImageUrl: Full URL to the event hero/banner image.
  # Used in emails and OG social badges. Must be an absolute URL.
  heroImageUrl: "/events/2026/pqc-conference-amsterdam-nl/amsterdam-nl.png"
  # venue: Physical address shown in calendar invites for in-person attendees.
  venue: "Meervaart, Meer en Vaart 300, 1068 LE, Amsterdam, Netherlands"
  # virtualUrl: Override the URL shown to virtual/live attendees in their calendar invite.
  # Defaults to {eventPage}/virtual/ when not set.
  # virtualUrl: "https://pkic.org/events/2026/pqc-conference-amsterdam-nl/virtual/"
  days:
    - date: "2026-12-01"
      label: Tuesday 1 December 2026
      startsAt: "2026-12-01T08:00:00.000Z"
      endsAt: "2026-12-01T18:00:00.000Z"
      sortOrder: 10
      attendanceOptions:
        - value: in_person
          label: In-person
          capacity: 800
        - value: virtual
          label: Virtual
        - value: on_demand
          label: On-demand
    - date: "2026-12-02"
      label: Wednesday 2 December 2026
      startsAt: "2026-12-02T08:00:00.000Z"
      endsAt: "2026-12-02T18:00:00.000Z"
      sortOrder: 20
      attendanceOptions:
        - value: in_person
          label: In-person
          capacity: 800
        - value: virtual
          label: Virtual
        - value: on_demand
          label: On-demand
    - date: "2026-12-03"
      label: Thursday 3 December 2026
      startsAt: "2026-12-03T08:00:00.000Z"
      endsAt: "2026-12-03T18:00:00.000Z"
      sortOrder: 30
      attendanceOptions:
        - value: in_person
          label: In-person
          capacity: 800
        - value: virtual
          label: Virtual
        - value: on_demand
          label: On-demand

terms:
  attendee:
    - termKey: privacy-policy
      version: v1
      required: true
      contentRef: /privacy-policy/
      displayText: I have read and accept the privacy policy.
    - termKey: code-of-conduct
      version: v1
      required: true
      contentRef: /code-of-conduct/
      displayText: I have read and agree to follow the code of conduct.
    - termKey: photo-policy
      version: v1
      required: true
      displayText: I acknowledge that photos and videos will be taken during the event, and I consent to being photographed or recorded if attending in person.
    - termKey: sponsor-data-sharing
      version: v1
      required: false
      helpText: "To offer this event free of charge, our sponsors contribute between $100 and $300 per attendee daily to cover venue, catering, and production costs. By opting in, you allow us to share your professional profile (name, organization, job title, and email) with the sponsors of this specific event for networking and follow-up purposes."
      displayText: I consent to the PKI Consortium sharing my professional profile with event sponsors and partners.
  speaker:
    - termKey: physical-presence
      version: v1
      required: true
      displayText: I confirm that I will attend the conference in person and acknowledge that remote presentations are not permitted.
    - termKey: expense-responsibility
      version: v1
      required: true
      displayText: I acknowledge that I am responsible for all expenses related to travel, accommodation, and personal subsistence.
    - termKey: non-commercial-agreement
      version: v1
      required: true
      displayText: I agree to refrain from promoting specific products, services, or other commercial interests during my session.
    - termKey: session-distribution
      version: v1
      required: true
      displayText: I consent to my session(s) being promoted, live-streamed, recorded, and made publicly available by the organizers.
    - termKey: slide-specifications
      version: v1
      required: true
      displayText: I agree to provide my presentation slides in PowerPoint format using a 16:9 aspect ratio.
    - termKey: topic-depth-focus
      version: v1
      required: true
      displayText: I confirm that my session has a clear focus and does not cover several aspects or areas of Post-Quantum Cryptography.

organizers:
  - email: admin@pkic.org
    firstName: PKIC
    lastName: Admin
    organizationName: PKI Consortium
    jobTitle: Event Organizer
  - email: paul.vanbrouwershaven@pkic.org
    firstName: Paul
    lastName: van Brouwershaven
    organizationName: PKI Consortium
    jobTitle: Chair

forms:
  - key: pqc-2026-registration
    purpose: event_registration
    title: PQC Conference 2026 Registration
    description: Event registration additional questions.
    fields:
      # ── Profile fields ─────────────────────────────────────────────────────
      # Keys organization_name and job_title are automatically promoted to the
      # user profile by the registration service. Country / state_region are
      # stored in custom answers for sponsor and logistics purposes.
      - key: organization_name
        label: Organization
        type: text
        required: true
        sortOrder: 1
        validation:
          maxLength: 120
          placeholder: Your company or institution
          helpText: Helps us tailor session recommendations and connects you with relevant sponsors.
      - key: job_title
        label: Job title
        type: text
        required: true
        sortOrder: 2
        validation:
          maxLength: 120
          placeholder: e.g. CISO, Software Engineer, Policy Advisor
      - key: country
        label: Country
        type: text
        required: true
        sortOrder: 3
        validation:
          format: iso_country
          helpText: Country of residence or work, used for demographic insights.
      - key: state_region
        label: State / Province
        type: text
        required: false
        sortOrder: 4
        validation:
          maxLength: 80
          placeholder: e.g. California, Ontario
          helpText: State or province of residence or work, used for demographic insights.
      # ── Event-specific questions ────────────────────────────────────────────
      - key: dietary_restrictions
        label: Dietary restrictions
        type: multi_select
        required: false
        sortOrder: 10
        options: 
          - Vegetarian
          - Vegan
          - Halal
          - Kosher
          - Gluten free
          - Lactose free
          - Nut allergy
          - Shellfish allergy
          - Other
        validation:
          uiWidget: checkboxes
          showWhen:
            dayAttendanceIn: [in_person]
          helpText: "Note: We will share this information with the venue to help accommodate your needs. However, please be aware that we cannot guarantee that all dietary requirements will be met. We accept no responsibility for any issues arising from unmet dietary needs."
      - key: interests
        label: Interests (topics)
        type: multi_select
        required: false
        sortOrder: 20
        options:
          - PKI
          - Certificate Management
          - Code Signing
          - Identity and Access Management
          - Zero Trust
          - Cryptographic Agility
          - Cryptographic Migration
          - Hybrid Cryptography
          - Cryptographic Inventory
          - Cryptographic Discovery
          - Algorithms
          - Cryptanalysis
          - Key Management
          - TLS / SSL
          - SSH
          - VPN
          - IPsec
          - Hardware Security Modules (HSM)
          - Smart Cards
          - Security Tokens
          - Secure Hardware
          - Automation
          - Cloud Security
          - IoT Security
          - Mobile Security
          - Governance
          - Compliance
          - Policy
          - Standards (NIST / FIPS / ETSI)
          - Research
          - Open Source
        validation:
          uiWidget: tags
          allowCustom: true
          maxItems: 10
          placeholder: Type a topic…
          helpText: Pick from the suggestions or type your own.


  - key: pqc-2026-proposals
    purpose: proposal_submission
    title: PQC Conference 2026 Proposal Details
    description: Additional proposal metadata for reviewers and organizers.
    fields:
      - key: session_track
        label: Preferred track
        type: select
        required: true
        sortOrder: 10
        options: 
          - Strategy and Roadmaps
          - Technical Deep Dive
          - Deployments and Lessons Learned
          - Policy and Standards
      - key: target_audience
        label: Target audience level
        type: select
        required: true
        sortOrder: 20
        options: 
          - Introductory
          - Intermediate
          - Advanced
          - Expert
      - key: prior_talk_link
        label: Sample talk or video
        type: url
        required: false
        sortOrder: 40
        validation:
          placeholder: https://www.youtube.com/watch?v=...
          helpText: "Optional: share a recording of a previous talk that shows your speaking style and expertise. This should be a reference sample — the session you are proposing must be new and not a repeat of an existing talk."

emailTemplates:
  # Optional overrides; when omitted, defaults for all required keys are seeded.
  templates: []

    <meta charset="utf-8">

    <title>{{ .Title }}{{ if eq .IsHome false }} | {{ .Site.Title }}{{ end }}</title>

    {{- with $.Param "robots" -}}
    <meta name="robots" content="{{.}}">
    {{- end -}}

    <meta name="viewport" content="width=device-width, initial-scale=1">

    {{ if (or .Description .Summary)}}<meta content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . }}{{ end }}{{ end }}" name="description">{{ end }}
    {{ if .Keywords }}<meta content="{{ delimit .Keywords "," }}" name="keywords">{{ end }}
    {{ with $.Param "redirect" }}<meta http-equiv="refresh" content="0; url={{ . }}" />{{ end }}

    {{ partial "image.html" . }}
    {{ template "_internal/opengraph.html" . }}

    <link rel="canonical" href="{{ .Permalink }}">
    <link rel="alternate" type="application/rss+xml" href="{{ .Site.BaseURL}}/feed/blog/" title="Subscribe to updates from the PKI Consortium blog" />
    <link rel="alternate" type="application/rss+xml" href="{{ .Site.BaseURL}}/news/feed/" title="Subscribe to news from the PKI Consortium members" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="180x180" href="/img/icon-180x180-black-trans.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="180x180" href="/img/icon-180x180-white-trans.png" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="/img/icon-180x180-black-white.png">
